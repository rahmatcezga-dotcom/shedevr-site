<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.bar{background:#1e293b;padding:10px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #334155}
.bar input{flex:1;padding:10px 14px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:.95em}
.bar button{padding:10px 20px;background:#38bdf8;color:#0f172a;border:none;border-radius:8px;font-weight:700;cursor:pointer}
.home{max-width:800px;margin:40px auto;padding:0 20px}
h1{color:#38bdf8;margin-bottom:20px}
.search-box{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:20px}
.search-box input{width:100%;padding:12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:1em;margin-bottom:10px}
.search-box button{padding:12px 24px;background:#38bdf8;color:#0f172a;border:none;border-radius:8px;font-weight:700;cursor:pointer;width:100%}
.video-container{position:relative;padding-bottom:56.25%;height:0;background:#000;border-radius:12px;overflow:hidden;margin-bottom:20px}
.video-container iframe{position:absolute;top:0;left:0;width:100%;height:100%}
.results{display:grid;gap:12px}
.result{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:12px;cursor:pointer;display:flex;gap:12px}
.result:hover{border-color:#38bdf8}
.result img{width:120px;height:68px;background:#334155;border-radius:6px;object-fit:cover}
.result .info{flex:1}
.result .title{font-weight:600;color:#f1f5f9;font-size:.95em}
.result .channel{color:#64748b;font-size:.8em;margin-top:4px}
.loading{text-align:center;padding:40px;color:#64748b}
.status{position:fixed;bottom:20px;right:20px;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px 16px;font-size:.8em;color:#94a3b8;z-index:100}
</style>
</head>
<body>
<div class="bar">
<a href="/" style="color:#38bdf8;text-decoration:none;font-weight:700">AI Assistant</a>
<input id="url" placeholder="YouTube URL or search...">
<button onclick="loadVideo()">Watch</button>
</div>
<div class="home">
<h1 id="title">Video Player</h1>
<div class="search-box">
<input id="search" placeholder="Search YouTube..." onkeypress="if(event.key==='Enter')searchYT()">
<button onclick="searchYT()">Search</button>
</div>
<div class="video-container" id="player" style="display:none"></div>
<div class="results" id="results"></div>
<div class="loading" id="loading" style="display:none">Loading...</div>
</div>
<div class="status" id="status">Ready</div>
<script>
var T='http://45.38.19.133:8888/connect?url=';

function loadVideo(){
    var u=document.getElementById('url').value;
    if(!u)return;
    var vid=extractId(u);
    if(vid){
        document.getElementById('player').style.display='block';
        document.getElementById('player').innerHTML='<iframe src="https://www.youtube.com/embed/'+vid+'" frameborder="0" allow="autoplay;encrypted-media" allowfullscreen></iframe>';
        document.getElementById('title').textContent='Video';
        document.getElementById('status').textContent='Playing: '+vid;
    }
}

function extractId(u){
    if(u.includes('v='))return u.split('v=')[1].split('&')[0];
    if(u.includes('youtu.be/'))return u.split('youtu.be/')[1].split('?')[0];
    if(u.length===11)return u;
    return null;
}

function searchYT(){
    var q=document.getElementById('search').value;
    if(!q)return;
    document.getElementById('loading').style.display='block';
    document.getElementById('results').innerHTML='';
    fetch(T+encodeURIComponent('https://www.youtube.com/results?search_query='+encodeURIComponent(q)))
    .then(function(r){return r.text()})
    .then(function(html){
        document.getElementById('loading').style.display='none';
        var parser=new DOMParser();
        var doc=parser.parseFromString(html,'text/html');
        var items=doc.querySelectorAll('ytd-video-renderer');
        var h='';
        items.forEach(function(item,i){
            if(i>=10)return;
            var title=item.querySelector('#video-title');
            var channel=item.querySelector('#channel-name');
            var vid=title?title.getAttribute('href'):'';
            if(vid)vid=vid.replace('/watch?v=','');
            var t=title?title.textContent.trim():'';
            var c=channel?channel.textContent.trim():'';
            var thumb='https://img.youtube.com/vi/'+vid+'/mqdefault.jpg';
            h+='<div class="result" onclick="playVideo(\''+vid+'\')">';
            h+='<img src="'+thumb+'">';
            h+='<div class="info"><div class="title">'+t+'</div>';
            h+='<div class="channel">'+c+'</div></div></div>';
        });
        document.getElementById('results').innerHTML=h||'<p>No results</p>';
        document.getElementById('status').textContent='Found '+items.length+' results';
    })
    .catch(function(e){
        document.getElementById('loading').style.display='none';
        document.getElementById('status').textContent='Error: '+e.message;
    });
}

function playVideo(vid){
    document.getElementById('player').style.display='block';
    document.getElementById('player').innerHTML='<iframe src="https://www.youtube.com/embed/'+vid+'?autoplay=1" frameborder="0" allow="autoplay;encrypted-media" allowfullscreen></iframe>';
    document.getElementById('player').scrollIntoView({behavior:'smooth'});
    document.getElementById('status').textContent='Playing: '+vid;
}
</script>
</body>
</html>
